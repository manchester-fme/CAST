name: OpenSMT Coverage Mapper

on:
  workflow_call:
    inputs:
      opensmt_commit_hash:
        description: 'OpenSMT commit hash to build coverage for'
        required: false
        type: string
      test_count:
        description: 'Pre-counted test count (optional optimization)'
        required: false
        type: number
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      AWS_S3_BUCKET:
        required: true

  workflow_dispatch:
    inputs:
      opensmt_commit_hash:
        description: 'Optional: OpenSMT commit hash to build coverage mapping for (defaults to HEAD)'
        required: false
        type: string

jobs:
  discover-tests:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      total_tests: ${{ steps.generate-matrix.outputs.total_tests }}
      total_jobs: ${{ steps.generate-matrix.outputs.total_jobs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout OpenSMT repository
        run: |
          if [ -d "opensmt" ]; then
            cd opensmt
            git fetch origin
          else
            git clone https://github.com/usi-verification-and-security/OpenSMT.git opensmt
            cd opensmt
          fi

      - name: Checkout OpenSMT specific commit if provided
        if: inputs.opensmt_commit_hash != ''
        run: |
          cd opensmt
          git checkout ${{ inputs.opensmt_commit_hash }}
          echo "Checked out commit: $(git rev-parse HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate dynamic matrix
        id: generate-matrix
        run: |
          python3 scripts/opensmt/coverage/generate_matrix.py \
            --opensmt-dir opensmt \
            --max-job-time 60 \
            --buffer 10 \
            --output matrix.json

          MATRIX=$(jq -c '.matrix' matrix.json)
          TOTAL_TESTS=$(jq -r '.total_tests' matrix.json)
          TOTAL_JOBS=$(jq -r '.total_jobs' matrix.json)

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "total_tests=$TOTAL_TESTS" >> $GITHUB_OUTPUT
          echo "total_jobs=$TOTAL_JOBS" >> $GITHUB_OUTPUT

          echo "✅ Generated matrix with $TOTAL_JOBS jobs for $TOTAL_TESTS tests"
          cat matrix.json

  coverage-analysis:
    needs: discover-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-tests.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout OpenSMT repository
        run: |
          if [ -d "opensmt" ]; then
            cd opensmt
            git fetch origin
          else
            git clone https://github.com/usi-verification-and-security/OpenSMT.git opensmt
            cd opensmt
          fi

      - name: Checkout OpenSMT specific commit if provided
        if: inputs.opensmt_commit_hash != ''
        run: |
          cd opensmt
          git checkout ${{ inputs.opensmt_commit_hash }}
          echo "Checked out commit: $(git rev-parse HEAD)"

      - name: Build OpenSMT with coverage
        run: |
          bash "${{ github.workspace }}/scripts/opensmt/build.sh" --coverage

      - name: Run coverage analysis (tests ${{ matrix.start_index }}-${{ matrix.end_index }})
        run: |
          ${{ github.workspace }}/scripts/measure_time.sh \
            bash \
            ${{ github.workspace }}/scripts/opensmt/coverage/run_coverage_builder.sh \
            ${{ matrix.start_index }} \
            ${{ matrix.end_index }}

      - name: Upload coverage mapping
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mapping-${{ matrix.job_name }}
          path: opensmt/build/coverage_mapping_${{ matrix.start_index }}_${{ matrix.end_index }}.json
          retention-days: 1

  join-mappings:
    runs-on: ubuntu-latest
    needs: [discover-tests, coverage-analysis]
    outputs:
      commit_hash: ${{ steps.get-commit.outputs.commit_hash }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get OpenSMT commit hash
        id: get-commit
        run: |
          if [ -n "${{ inputs.opensmt_commit_hash }}" ]; then
            COMMIT_HASH="${{ inputs.opensmt_commit_hash }}"
          else
            if [ ! -d "opensmt" ]; then
              git clone https://github.com/usi-verification-and-security/OpenSMT.git opensmt
            fi
            cd opensmt
            git fetch origin
            COMMIT_HASH=$(git rev-parse HEAD)
            cd ..
          fi
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "OpenSMT commit hash: $COMMIT_HASH"

      - name: Download all coverage mappings
        uses: actions/download-artifact@v4
        with:
          path: coverage-mappings

      - name: Join coverage mappings
        run: |
          python3 scripts/opensmt/coverage/join_coverage_mappings.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload final coverage mapping to S3
        run: |
          COMMIT_HASH="${{ steps.get-commit.outputs.commit_hash }}"
          S3_KEY="solvers/opensmt/coverage-mappings/coverage_mapping-${COMMIT_HASH}.json.gz"

          if [ ! -f "coverage_mapping.json.gz" ]; then
            echo "❌ Error: coverage_mapping.json.gz not found"
            exit 1
          fi

          aws s3api put-object \
            --bucket ${{ secrets.AWS_S3_BUCKET }} \
            --key "$S3_KEY" \
            --body coverage_mapping.json.gz \
            --tagging "Type=CoverageMapping"

          echo "✅ Uploaded coverage mapping to S3"
          echo "S3 path: s3://${{ secrets.AWS_S3_BUCKET }}/${S3_KEY}"
          echo "Commit hash: ${COMMIT_HASH}"

  update-state:
    runs-on: ubuntu-latest
    needs: [discover-tests, join-mappings]
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install boto3
        run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update coverage state
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python3 scripts/coverage/coverage_state.py opensmt update \
            --test-count ${{ needs.discover-tests.outputs.total_tests }} \
            --commit-hash ${{ needs.join-mappings.outputs.commit_hash }} \
            --updated-by "${{ github.workflow }}"

          echo "✅ Updated coverage state: ${{ needs.discover-tests.outputs.total_tests }} tests"
