name: OpenSMT Commit Fuzzer

env:
  LOCAL_TEST_LIMIT: 16

on:
  workflow_dispatch:
    inputs:
      opensmt_commit_hash:
        description: 'Optional: OpenSMT commit hash to fuzz (defaults to upstream HEAD)'
        required: false
        type: string
      stop_buffer_minutes:
        description: 'Optional: Minutes before timeout to stop fuzzing (default: 5)'
        required: false
        type: number
        default: 5
  schedule:
    - cron: '45 0,5,10,15,20 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  run-fuzzer:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libc6-dev \
            gcc \
            g++ \
            binutils \
            libstdc++-14-dev \
            libc++-dev \
            libc++abi-dev \
            jq \
            zlib1g \
            zlib1g-dev \
            unzip
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install Python dependencies
        run: |
          pip install psutil requests antlr4-python3-runtime==4.9.2
          git clone https://github.com/testsmt/yinyang.git
          cd yinyang
          pip install -e .
          cd ..

      - name: Clone OpenSMT repository
        run: |
          if [ -d "opensmt" ]; then
            echo "OpenSMT directory already exists, skipping clone"
          else
            git clone https://github.com/usi-verification-and-security/OpenSMT.git opensmt
          fi

      - name: Fetch OpenSMT refs
        working-directory: opensmt
        run: git fetch --all --tags

      - name: Checkout OpenSMT commit
        if: inputs.opensmt_commit_hash != ''
        working-directory: opensmt
        run: |
          git checkout ${{ inputs.opensmt_commit_hash }}
          echo "Checked out commit: $(git rev-parse HEAD)"

      - name: Record OpenSMT commit hash
        id: get-commit
        working-directory: opensmt
        run: |
          echo "commit_hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "OpenSMT commit hash: $(git rev-parse HEAD)"

      - name: Build OpenSMT static binary
        run: bash "${{ github.workspace }}/scripts/opensmt/build.sh" --static

      - name: Install CVC5 oracle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/download_cvc5.py "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate local test set
        id: build-matrix
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 scripts/local_commit_fuzzer_matrix.py opensmt \
            --opensmt-dir opensmt \
            --limit-tests "${LOCAL_TEST_LIMIT}" \
            --max-jobs 1 \
            --output matrix.json

          TEST_COUNT=$(jq -r '.total_tests' matrix.json)
          if [ "$TEST_COUNT" = "0" ]; then
            echo "No tests discovered"
            echo "tests_json=[]" >> "$GITHUB_OUTPUT"
            echo "test_count=0" >> "$GITHUB_OUTPUT"
          else
            TESTS_JSON=$(jq -c '.matrix.include[0].tests' matrix.json)
            echo "tests_json=$TESTS_JSON" >> "$GITHUB_OUTPUT"
            echo "test_count=$TEST_COUNT" >> "$GITHUB_OUTPUT"
            echo "Selected $TEST_COUNT tests"
          fi

      - name: Run local commit fuzzer
        if: steps.build-matrix.outputs.test_count != '0'
        working-directory: opensmt
        env:
          TESTS_JSON: ${{ steps.build-matrix.outputs.tests_json }}
        run: |
          mkdir -p ../logs ../bugs
          JOB_START=$(date +%s)
          STOP_BUFFER="${{ inputs.stop_buffer_minutes || 5 }}"

          set -o pipefail
          python3 "${{ github.workspace }}/scripts/opensmt/commit_fuzzer/run_commit_fuzzer.py" \
            --tests-json "$TESTS_JSON" \
            --job-id 'opensmt-local' \
            --tests-root 'test/regression' \
            --job-start-time "$JOB_START" \
            --stop-buffer-minutes "$STOP_BUFFER" \
            --iterations 250 \
            --workers 4 \
            --opensmt-path opensmt \
            --cvc5-path cvc5 \
            |& tee "../logs/opensmt-fuzzer.log"

      - name: Upload local matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opensmt-local-matrix
          path: matrix.json
          retention-days: 1

      - name: Upload fuzzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opensmt-fuzzer-log
          path: logs/opensmt-fuzzer.log
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload bugs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opensmt-bugs
          path: opensmt/bugs
          retention-days: 1
          if-no-files-found: ignore
