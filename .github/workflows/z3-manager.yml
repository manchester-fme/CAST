name: Z3 Manager

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Optional: Commit hash to add to build queue'
        required: false
        type: string
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes

jobs:
  manager:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install boto3 GitPython requests
      
      - name: Configure storage backend
        uses: ./.github/actions/configure-storage
        with:
          secrets: ${{ toJSON(secrets) }}
          storage_provider: ${{ vars.AWS_STORAGE_PROVIDER }}
      
      - name: Run manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.commit_hash }}" ]; then
            # Manual trigger: check for C++ changes before adding to build queue
            COMMIT_HASH="${{ inputs.commit_hash }}"
            if python3 src/scheduling/detect_cpp_changes.py https://github.com/Z3Prover/z3.git "$COMMIT_HASH" --token $GITHUB_TOKEN; then
              echo "✅ Commit $COMMIT_HASH has C++ changes, adding to build queue and fuzzing schedule"
              python3 src/scheduling/s3_state.py z3 build-queue add "$COMMIT_HASH"
              python3 src/scheduling/s3_state.py z3 fuzzing-schedule add "$COMMIT_HASH"
            else
              echo "❌ Commit $COMMIT_HASH has no C++ changes, skipping"
              exit 1
            fi
          else
            # Scheduled run: check commits and update queues
            python3 src/scheduling/manager.py z3 https://github.com/Z3Prover/z3.git --token $GITHUB_TOKEN
          fi

