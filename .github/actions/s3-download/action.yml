name: S3 conditional download
description: Downloads an object from the configured bucket if it exists (AWS S3 or Cloudflare R2)
inputs:
  key:
    description: Object key to look up
    required: true
  destination:
    description: Local path to download the object to
    required: true
  debug_list_prefix:
    description: 'Optional key prefix to list for debugging when the object is not found'
    required: false
outputs:
  found:
    description: "'true' if the object existed and was downloaded, 'false' otherwise"
    value: ${{ steps.download.outputs.found }}
runs:
  using: composite
  steps:
    - id: download
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ env.CAST_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.CAST_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.CAST_DEFAULT_REGION }}
        AWS_ENDPOINT_URL_S3: ${{ env.CAST_ENDPOINT_URL_S3 }}
        KEY: ${{ inputs.key }}
        DESTINATION: ${{ inputs.destination }}
        DEBUG_LIST_PREFIX: ${{ inputs.debug_list_prefix }}
      run: |
        if HEAD_OUTPUT=$(aws s3api head-object --bucket "$CAST_BUCKET_NAME" --key "$KEY" 2>&1); then
          echo "Downloading s3://$CAST_BUCKET_NAME/$KEY"
          aws s3 cp "s3://$CAST_BUCKET_NAME/$KEY" "$DESTINATION"
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "Object not found or inaccessible: $KEY"
          echo "$HEAD_OUTPUT"
          if [ -n "$DEBUG_LIST_PREFIX" ]; then
            echo "Listing s3://$CAST_BUCKET_NAME/$DEBUG_LIST_PREFIX for debugging:"
            aws s3 ls "s3://$CAST_BUCKET_NAME/$DEBUG_LIST_PREFIX" | head -5 || echo "Failed to list objects"
          fi
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi
