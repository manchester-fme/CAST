name: S3 put object
description: Uploads a file to the configured object storage bucket (AWS S3 or Cloudflare R2)
inputs:
  key:
    description: Destination object key within the bucket
    required: true
  body:
    description: Path to the local file to upload
    required: true
  tagging:
    description: 'Optional object tagging, e.g. "Type=Production"'
    required: false
runs:
  using: composite
  steps:
    - shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ env.CAST_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.CAST_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.CAST_DEFAULT_REGION }}
        AWS_ENDPOINT_URL_S3: ${{ env.CAST_ENDPOINT_URL_S3 }}
        KEY: ${{ inputs.key }}
        BODY: ${{ inputs.body }}
        TAGGING: ${{ inputs.tagging }}
      run: |
        args=(--bucket "$CAST_BUCKET_NAME" --key "$KEY" --body "$BODY")
        if [ -n "$TAGGING" ]; then
          args+=(--tagging "$TAGGING")
        fi
        aws s3api put-object "${args[@]}"
