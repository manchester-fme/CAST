name: Configure storage backend
description: Resolves the object storage backend and exports its settings into GITHUB_ENV
inputs:
  secrets:
    description: 'Pass toJSON(secrets) from the caller'
    required: true
  storage_provider:
    description: 'Pass vars.AWS_STORAGE_PROVIDER from the caller ("r2" or "aws")'
    required: false
runs:
  using: composite
  steps:
    - shell: bash
      env:
        ALL_SECRETS: ${{ inputs.secrets }}
        AWS_STORAGE_PROVIDER: ${{ inputs.storage_provider }}
      run: |
        for k in AWS_BUCKET_NAME AWS_ACCOUNT_ID AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION; do
          export "$k=$(jq -r --arg k "$k" '.[$k] // ""' <<<"$ALL_SECRETS")"
        done
        ./src/util/configure_storage.sh >> "$GITHUB_ENV"
