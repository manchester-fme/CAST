name: S3 find latest object
description: Lists a prefix in the configured bucket and returns the lexicographically last matching object name (AWS S3 or Cloudflare R2)
inputs:
  prefix:
    description: 'Key prefix to list, e.g. solvers/cvc5/coverage-mappings/'
    required: true
  match:
    description: Substring the object name must contain
    required: true
outputs:
  key:
    description: File name of the latest matching object, relative to prefix (empty if none found)
    value: ${{ steps.find.outputs.key }}
runs:
  using: composite
  steps:
    - id: find
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ env.CAST_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.CAST_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.CAST_DEFAULT_REGION }}
        AWS_ENDPOINT_URL_S3: ${{ env.CAST_ENDPOINT_URL_S3 }}
        PREFIX: ${{ inputs.prefix }}
        MATCH: ${{ inputs.match }}
      run: |
        LATEST=$(aws s3 ls "s3://$CAST_BUCKET_NAME/$PREFIX" \
          | grep "$MATCH" \
          | sort -r \
          | head -n 1 \
          | awk '{print $4}' || echo "")
        echo "key=$LATEST" >> "$GITHUB_OUTPUT"
